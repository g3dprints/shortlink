<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abrir Enlace</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #fafafa; gap: 15px; }
        .btn-app { display: inline-block; padding: 15px 30px; background: #e1306c; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; width: 200px; text-align: center; }
        .btn-web { display: inline-block; padding: 15px 30px; background: #0095f6; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; width: 200px; text-align: center; }
        .panel { display: none; text-align: center; }
        input { padding: 10px; margin-bottom: 10px; width: 200px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #333; color: white; border: none; border-radius: 5px; font-weight: bold; }
    </style>
    <script>
        window.onload = function() {
            const u = new URLSearchParams(window.location.search).get('u');
            if (u) {
                // Limpia posibles @ o espacios que metas por error
                const usuarioLimpio = u.trim().replace('@', '');
                
                document.getElementById('pantalla-links').style.display = 'flex';
                
                // Asigna las rutas correctas con la barra "/" explícita desde el principio
                document.getElementById('link-app').href = "instagram://user?username=" + usuarioLimpio;
                document.getElementById('link-web').href = "https://instagram.com" + usuarioLimpio;
            } else {
                document.getElementById('panel-creador').style.display = 'block';
            }
        }
    </script>
</head>
<body>

    <!-- Pantalla que ve el usuario al escanear el NFC -->
    <div id="pantalla-links" style="display: none; flex-direction: column; gap: 15px; align-items: center;">
        <a id="link-app" class="btn-app" href="#">Abrir en la App</a>
        <a id="link-web" class="btn-web" href="#" target="_blank">Abrir en Navegador</a>
    </div>

    <!-- Tu panel privado para generar los enlaces cortos -->
    <div id="panel-creador" class="panel">
        <h3>Creador de Links NFC</h3>
        <input type="text" id="i" placeholder="Usuario de Instagram"><br>
        <button onclick="alert(window.location.origin + window.location.pathname + '?u=' + document.getElementById('i').value.trim().replace('@', ''))">Generar Link</button>
    </div>

</body>
</html>
