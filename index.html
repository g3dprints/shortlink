<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Generador de Enlaces Cortos</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #fafafa; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .panel { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; display: none; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #dbdbdb; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #0095f6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .resultado { margin-top: 20px; padding: 15px; background: #f0f9ff; border: 1px dashed #0095f6; border-radius: 6px; word-break: break-all; font-weight: bold; }
    </style>
    <script>
        window.onload = function() {
            const u = new URLSearchParams(window.location.search).get('u');
            if (u) {
                // Redirección directa y limpia: el sistema operativo móvil decide si abre la app o la web
                window.location.href = `https://instagram.com{u}`;
            } else {
                document.getElementById('panel-creador').style.display = 'block';
            }
        }

        function generarLink() {
            const user = document.getElementById('input-usuario').value.trim().replace('@', '');
            if (user === "") return alert("Por favor escribe un usuario válido");
            
            const miDominio = window.location.origin + window.location.pathname;
            const linkCorto = `${miDominio}?u=${user}`;
            
            document.getElementById('texto-resultado').innerText = linkCorto;
            document.getElementById('zona-resultado').style.display = 'block';
        }
    </script>
</head>
<body>

    <!-- Tu panel privado con el diseño elegante del principio -->
    <div id="panel-creador" class="panel">
        <h2 style="margin-top:0; color:#262626;">Creador de Links NFC</h2>
        <p style="color:#8e8e8e; font-size:14px;">Escribe el usuario de Instagram para generar tu enlace corto:</p>
        <input type="text" id="input-usuario" placeholder="Ej: leomessi">
        <button onclick="generarLink()">Generar Enlace Corto</button>
        <div id="zona-resultado" style="display: none;">
            <p style="margin-top:20px; margin-bottom:5px; font-size:14px; color:#262626;">Copia este enlace en NFC Tools:</p>
            <div id="texto-resultado" class="resultado"></div>
        </div>
    </div>

</body>
</html>
