<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Enlaces NFC</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#fafafa;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.panel{
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
    width:350px;
}

input{
    width:100%;
    padding:12px;
    margin:15px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#0095f6;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.resultado{
    margin-top:20px;
    padding:10px;
    background:#eef8ff;
    word-break:break-all;
}
</style>

</head>
<body>

<div class="panel">

<h2>Generador NFC</h2>

<input
id="usuario"
type="text"
placeholder="Ej: leomessi">

<button onclick="generar()">
Generar enlace
</button>

<div id="resultado" class="resultado" style="display:none;"></div>

</div>

<script>

function generar(){

    const usuario=document
    .getElementById("usuario")
    .value
    .trim()
    .replace("@","");

    if(usuario==""){
        alert("Escribe un usuario.");
        return;
    }

    const enlace=`${window.location.origin}${window.location.pathname}?u=${usuario}`;

    document.getElementById("resultado").style.display="block";
    document.getElementById("resultado").innerText=enlace;

}

const params=new URLSearchParams(window.location.search);
const usuario=params.get("u");

if(usuario){

    document.body.innerHTML=`
        <div style="font-family:Arial;text-align:center;margin-top:100px;">

            <a href="instagram://user?username=${usuario}"
               style="display:block;background:#E1306C;color:white;padding:15px;margin:10px auto;width:220px;text-decoration:none;border-radius:8px;">
                Agregar en Android
            </a>

            <a href="https://www.instagram.com/${usuario}/"
               target="_blank"
               style="display:block;background:#0095F6;color:white;padding:15px;margin:10px auto;width:220px;text-decoration:none;border-radius:8px;">
                Agregar en iOS
            </a>

        </div>
    `;
}

</script>

</body>
</html>
