<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Generador de Enlaces Cortos</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .panel { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; display: none; }
        .redireccion { text-align: center; display: none; gap: 15px; flex-direction: column; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #dbdbdb; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #0095f6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .resultado { margin-top: 20px; padding: 15px; background: #f0f9ff; border: 1px dashed #0095f6; border-radius: 6px; word-break: break-all; font-weight: bold; }
        .btn-app { display: inline-block; padding: 15px 30px; background: #e1306c; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; width: 200px; }
        .btn-web { display: inline-block; padding: 15px 30px; background: #0095f6; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; width: 200px; }
    </style>
</head>
<body>

    <!-- VISTA 1: Tu panel privado para crear los enlaces -->
    <div id="panel-creador" class="panel">
        <h2 style="margin-top:0;">Creador de Links NFC</h2>
        <p style="color:#666; font-size:14px;">Escribe el usuario de Instagram para generar tu enlace corto:</p>
        <input type="text" id="input-usuario" placeholder="Ej: leomessi">
        <button onclick="generarLink()">Generar Enlace Corto</button>
        <div id="zona-resultado" style="display: none;">
            <p style="margin-bottom:5px; font-size:14px; color:#333;">Copia este enlace en NFC Tools:</p>
            <div id="texto-resultado" class="resultado"></div>
        </div>
    </div>

    <!-- VISTA 2: Lo que ve la persona que escanea la tarjeta -->
    <div id="pantalla-redireccion" class="redireccion">
        <a id="link-app" class="btn-app" href="#">Abrir en la App</a>
        <a id="link-web" class="btn-web" href="#" target="_blank">Abrir en Navegador</a>
    </div>

    <script>
        // Detecta automáticamente si hay un usuario en la URL al cargar la página
        const urlParams = new URLSearchParams(window.location.search);
        const usuarioDestino = urlParams.get('u');
        const miDominio = window.location.origin + window.location.pathname;

        if (usuarioDestino) {
            // Si la URL contiene ?u=usuario, muestra los botones de redirección
            document.getElementById('pantalla-redireccion').style.display = 'flex';
            document.getElementById('link-app').href = `instagram://user?username=${usuarioDestino}`;
            document.getElementById('link-web').href = `https://instagram.com{usuarioDestino}`;
        } else {
            // Si entras directo a tu dominio limpio, te muestra el creador de enlaces
            document.getElementById('panel-creador').style.display = 'block';
        }
        
        function generarLink() {
            const user = document.getElementById('input-usuario').value;
            const linkCorto = window.location.origin + window.location.pathname + '/?u=' + user;
    
            document.getElementById('texto-resultado').innerText = linkCorto;
            document.getElementById('zona-resultado').style.display = 'block';
        }
    </script>
</body>
</html>
